<!Doctype html>
<html>
    <head>
        <title>Semester-3 Calculator</title>
        <style>
            body{
                font-family: Arial, Helvetica, sans-serif;
                text-align: center;
            }
            .box{
                background-color: maroon;
                padding: 20px;
                width: 400px;
                margin: auto;
                border-radius: 5px;
                box-shadow: 0 0 10px brown;
            }
            .input-bar {
                width: 100%;         
                height: 30px;     
                font-size: 16px;
                padding: 8px;
                box-sizing: border-box;
            }
        </style>
    </head>
    <body>
       <h2>Calculate Your Semester-3 Marks Here...</h2>
       <div class = "box">
            <input class = "input-bar" id = "P&S" type = "number" min = "0" max = "100" placeholder = "Enter P&S marks"><br><br>
            <input class = "input-bar" id = "DLD" type = "number" min = "0" max = "100" placeholder = "Enter DLD marks"><br><br>
            <input class = "input-bar" id = "DS" type = "number" min = "0" max = "100" placeholder = "Enter DS marks"><br><br>
            <input class = "input-bar" id = "OOP" type = "number" min = "0" max = "100" placeholder = "Enter OOP marks"><br><br>
            <input class = "input-bar" id = "AIML" type = "number" min = "0" max = "100" placeholder = "Enter AIML marks"><br><br>
            <input class = "input-bar" id = "PP" type = "number" min = "0" max = "100" placeholder = "Enter PP-LAB marks"><br><br>
            <input class = "input-bar" id = "CSL" type = "number" min = "0" max = "100" placeholder = "Enter CSL-LAB marks"><br><br>
            <input class = "input-bar" id = "DSL" type = "number" min = "0" max = "100" placeholder = "Enter DS-LAB marks"><br><br>
            <input class = "input-bar" id = "OOPL" type = "number" min = "0" max = "100" placeholder = "Enter OOP-LAB marks"><br><br>
            <input class = "input-bar" id = "HWYS" type = "number" min = "0" max = "100" placeholder = "Enter HWYS marks"><br><br>
            <button onclick = "MyCalc()">Submit</button>
            <h5 id = "output" style = "color: cornsilk"></h5>
            <p style = "margin-top: 30px; font-size: 16px; color: #fffddf; font-weight: bold;">✨ Created by Phanindra ✨</p>
       </div>
       <script>
        function MyCalc()
        {
            
            let grade,mark,values,total = 0;
            let marks,total_score,sum = 0;
            let id = ["P&S","DLD","DS","OOP","AIML","PP","CSL","DSL","OOPL","HWYS"];
            let credit = [3,3,3,3,3,2,2,1.5,1.5,0.5];

            for(let i = 0; i < id.length; i++){
                values = document.getElementById(id[i]).value;
                if(values === ""){
                    alert("please fill all the fields!...");
                    return;
                }
                
                marks = Number(values);
                if(isNaN(marks) || marks < 0 || marks > 100){
                    alert("Enter marks between 0 and 100 for all subjects");
                    return;
                }

                sum += credit[i];
                if(marks >= 90) grade = 10;
                else if(marks >= 80 && marks <= 89) grade = 9;
                else if(marks >= 70 && marks <= 79) grade = 8;
                else if(marks >= 60 && marks <= 69) grade = 7;
                else if(marks >= 50 && marks <= 59) grade = 6;
                else if(marks >= 40 && marks <= 49) grade = 5;
                else grade = 0;

                mark = grade * credit[i];
                total += mark;

            }
            total_score = total / sum;
            document.getElementById("output").innerText = "Total SGPA: " + total_score.toFixed(2);
        }
       </script>
    </body>
</html>
